name: 🐞 Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ['bug🐞']

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Before you submit a bug report, please run phfit with `--verbose` to get more detailed logs.

  - type: textarea
    id: description
    attributes:
      label: '📋 Description'
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: input
    id: phfit_version
    attributes:
      label: '🔖 pHfit Version'
      description: 'Required: Specify the pHfit version you are using. You can find this information in the `phfit -v` command.'
      placeholder: 'e.g., vX.X.X'
    validations:
      required: true

  - type: textarea
    attributes:
      label: '⚠️ Error message'
      description: |
        Optional: If applicable, add the error message here.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: '🔍 Environment'
      description: |
          Optional: The environment information.
          Example:
          OS: WSL (Ubuntu 22.04)
      value: |
          OS:
      render: markdown
    validations:
      required: false

  - type: textarea
    id: anything_else
    attributes:
      label: '📎 Anything else?'
      description: |
        Optional: Add any other contexts, links, or screenshots about the bug here.
    validations:
      required: false
