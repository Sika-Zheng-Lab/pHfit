name: Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - opened
      - reopened
  pull_request_review:
    types:
      - submitted

jobs:
  test:
    # Run on push to develop, PR events from develop, or when a review on a develop->main PR is approved
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.head_ref == 'develop') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.pull_request.head.ref == 'develop')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=phfit --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
