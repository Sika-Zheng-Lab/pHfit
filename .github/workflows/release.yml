name: Create Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions: write-all

jobs:
  create-release-and-build:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'version\s*=\s*\"(.+?)\"', open('pyproject.toml').read()).group(1))")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: v${VERSION}"

      - name: Create and push tag
        run: |
          TAG=${{ steps.get_version.outputs.version }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          draft: false
          prerelease: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image with tag
        run: |
          TAG=${{ steps.get_version.outputs.version }}
          docker build -t naotokubota/phfit:$TAG -t naotokubota/phfit:latest -f docker/Dockerfile .
          docker push naotokubota/phfit:$TAG
          docker push naotokubota/phfit:latest
